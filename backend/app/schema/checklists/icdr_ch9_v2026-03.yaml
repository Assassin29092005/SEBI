# Checklist schema — SEBI ICDR Chapter IX disclosure requirements for SME IPOs.
#
# Clause refs verified against:
#   - data/regulation/ICDR_2018_consolidated_amended_2025-03-08.pdf (consolidated text)
#   - data/regulation/ICDR_Amendment_Regulations_2026_notified_2026-03-16.pdf
#     (effective 2026-03-21: Sch. VI Part A cl. (4) "Offer Document Summary" OMITTED;
#      cl. (6) gains contingent-liabilities & RPT summaries; Reg 246(3) requires a
#      DRAFT ABRIDGED PROSPECTUS per Sch. VI Part E with the draft offer document)
#
# Part A paragraph map (verified from the consolidated text):
#   (1) Cover pages · (3) Definitions and abbreviations · (4) [omitted 2026] ·
#   (5) Risk factors · (6) Introduction · (7) General information ·
#   (8) Capital structure · (9) Particulars of the issue · (10) About the Issuer ·
#   (11) Financial Statements · (12) Legal and Other Information ·
#   (13) Group companies · (14) Other Regulatory and Statutory Disclosures ·
#   (15) Offering Information · (18) Other Information
#
# Human review pass completed 2026-07-03: every clause_ref checked line-by-line
# against data/regulation/schedule_vi_disclosures.txt (Schedule VI Part A/E) and
# data/regulation/chapter_ix_sme_ipo.txt (Chapter IX regulations), and against
# the inserted text in data/regulation/icdr_amendment_2026.txt. Sub-paragraph
# lettering (e.g. para (10)(F) for Management, para (14)(T) for investor
# grievances) was corrected where the prior draft cited only the top-level
# paragraph. This is a faithful encoding of the regulation, not legal advice —
# see CLAUDE.md "Known Limitations".
#
# NOTE: this schema is intentionally not a page-for-page transcription of
# Schedule VI — several entries deliberately bundle multiple sub-paragraphs
# under one checklist item (e.g. capital_structure.share_capital_history
# covers para (8)(A)-(B)) where a first-time SME promoter would reasonably
# answer them together in one wizard flow.
#
# 2026-07-10 (v0.4.0): six entries added to close the benchmark's not_encoded
# chapters (general.conventions_presentation, general.forward_looking_statements,
# business.key_regulations, offering.foreign_ownership_restrictions,
# offering.articles_provisions, other.declaration). Clause refs verified against
# data/regulation/schedule_vi_disclosures.txt (Instructions (a)/(e)-(g);
# para (10)(C); para (15)(B)(28); para (15)(C); para (18)(5) + the prescribed
# "DECLARATION BY THE ISSUER" text). PENDING the line-by-line human review pass
# that the 2026-07-03 entries received — review these six before any
# filing-critical use.

header:
  regulation: "SEBI (Issue of Capital and Disclosure Requirements) (ICDR) Regulations, 2018 — Chapter IX (SME IPOs); disclosures per Schedule VI Part A as applied by Reg. 246(2)(b); draft abridged prospectus per Schedule VI Part E as applied by Reg. 246(3)"
  amended_through: "2026-03-21"   # ICDR (Amendment) Regulations, 2026 — notified 2026-03-16
  schema_version: "0.4.0"
  reviewed_by_human: true         # human review pass completed 2026-07-03; see note above

entries:
  # ── General ──────────────────────────────────────────────────────────────
  - id: general.cover_pages
    clause_ref: "ICDR Sch. VI Part A, para (1)(a)(1)–(2) — front outside and front inside cover pages"
    section: "General"
    title: "Cover pages and issue details"
    description: >
      Front/inside cover: issuer identity, issue size, price band, lead
      manager(s), registrar, exchange, and prescribed risk legends. Inside
      front cover carries only the prescribed issue details.
    applicability: always
    required_facts:
      - issuer_identity
      - issue_size_paise
      - lead_managers[]
      - registrar_to_issue
      - sme_exchange
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp, abridged]

  - id: general.definitions_abbreviations
    clause_ref: "ICDR Sch. VI Part A, para (3)"
    section: "General"
    title: "Definitions and abbreviations"
    description: >
      Conventional/general and issue-related terms (SEBI, ICDR, DRHP, KMP,
      RPT, OFS, GCP, etc.) rendered from a fixed regulatory glossary, plus
      issuer-specific terms (company name, CIN, PAN) rendered from confirmed
      facts. System-generated; not LLM-authored, so no hallucination risk.
    applicability: always
    required_facts:
      - issuer_identity
    responsible_role: system
    severity: minor
    output_targets: [drhp]

  - id: general.conventions_presentation
    clause_ref: "ICDR Sch. VI Part A, Instructions (a), (f)–(g) — source/basis of all statements, consistency of presentation style, single standard financial unit for currency of presentation"
    section: "General"
    title: "Certain conventions and presentation of financial, industry and market data"
    description: >
      Conventions chapter: currency of presentation (single standard financial
      unit per Instruction (g)), financial-year convention, rounding, and the
      source/basis discipline for industry and market data (Instruction (a) —
      terms like "market leader" only with a citable source). Standard text
      parameterised by issuer particulars; system-generated, no hallucination
      risk.
    applicability: always
    required_facts:
      - issuer_identity
    responsible_role: system
    severity: minor
    output_targets: [drhp]

  - id: general.forward_looking_statements
    clause_ref: "ICDR Sch. VI Part A, Instruction (e) — no forward-looking statements that cannot be substantiated"
    section: "General"
    title: "Forward-looking statements"
    description: >
      The conventional forward-looking-statements chapter: identifies the
      words that signal forward-looking statements, cautions that actual
      results may differ materially, and states that the issuer undertakes
      no obligation to update them. Encodes Instruction (e)'s constraint
      that unsubstantiable forward-looking statements are prohibited.
      Standard text; system-generated.
    applicability: always
    required_facts:
      - issuer_identity
    responsible_role: system
    severity: minor
    output_targets: [drhp]

  # ── Risk Factors ─────────────────────────────────────────────────────────
  - id: risk_factors.material_risks
    clause_ref: "ICDR Sch. VI Part A, para (5)"
    section: "Risk Factors"
    title: "Material risk factors"
    description: >
      Issuer-specific and issue-specific risks in descending order of
      materiality, covering the illustrative matters in para (5) (customer
      concentration, losses, conflicts of interest, negative cash flow,
      litigation summary cross-reference, etc.). No generic boilerplate —
      the boilerplate detector enforces this.
    applicability: always
    required_facts:
      - business_description
      - customer_concentration
      - material_litigation[]
      - negative_cash_flow_years
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp, abridged]

  # ── Introduction ─────────────────────────────────────────────────────────
  - id: introduction.summary
    clause_ref: "ICDR Sch. VI Part A, para (6)(B)–(D) (financial/contingent-liabilities/RPT summary, sub-cl. (C)–(D) inserted by ICDR (Amendment) Regulations, 2026); Sch. VI Part E Annexure I items (1)–(2) (summary of business and industry, for the draft abridged prospectus)"
    section: "Introduction"
    title: "Summary of industry, business, financials, contingent liabilities and RPT"
    description: >
      Summary of the offer document: industry and business (per the draft
      abridged prospectus Annexure I), selected financial information, and —
      inserted by the 2026 amendment — Summary of Contingent Liabilities and
      Summary of Related Party Transactions.
    applicability: always
    required_facts:
      - business_description
      - industry_overview
      - selected_financial_summary
      - contingent_liabilities_summary
      - rpt_summary
    responsible_role: promoter
    severity: material
    output_targets: [drhp, abridged]

  # ── General Information ──────────────────────────────────────────────────
  - id: general_info.issuer_particulars
    clause_ref: "ICDR Sch. VI Part A, para (7)(A)–(F) — registered office, board, company secretary, compliance officer, lead manager(s)/registrar/bankers, statutory auditor"
    section: "General Information"
    title: "Issuer, board, company secretary, bankers, and issue management team"
    description: >
      Registered office, CIN, registrar of companies, board of directors,
      company secretary and compliance officer, lead manager(s), legal
      advisors, bankers, and statutory auditor particulars.
    applicability: always
    required_facts:
      - issuer_identity
      - registered_office
      - board_of_directors[]
      - compliance_officer
      - lead_managers[]
      - statutory_auditor
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp]

  # ── Capital Structure ────────────────────────────────────────────────────
  - id: capital_structure.share_capital_history
    clause_ref: "ICDR Sch. VI Part A, para (8)(A)–(B)"
    section: "Capital Structure"
    title: "History of equity share capital"
    description: >
      Build-up of share capital since incorporation: date of allotment, number
      of shares, face value, issue price, nature of consideration, nature of
      allotment (bonus/rights/preferential/etc.).
    applicability: always
    required_facts:
      - share_allotments[]
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp, abridged]

  - id: capital_structure.promoter_shareholding
    clause_ref: "ICDR Sch. VI Part A, para (8)(A)–(B); lock-in per ICDR Reg. 238–242 (Ch. IX)"
    section: "Capital Structure"
    title: "Promoter and promoter group shareholding with lock-in"
    description: >
      Pre- and post-issue shareholding of promoters and promoter group,
      build-up of promoter holding, and lock-in details (minimum promoters'
      contribution per Reg. 236 as applied to SME issues).
    applicability: always
    required_facts:
      - promoters[]
      - promoter_shareholding[]
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp, abridged]

  # ── Objects of the Issue ─────────────────────────────────────────────────
  - id: objects.use_of_proceeds
    clause_ref: "ICDR Sch. VI Part A, para (9)(A), (E)–(I); OFS cap per Reg. 230(1)(f)–(g); firm financing arrangements per Reg. 230(1)(e)"
    section: "Objects of the Issue"
    title: "Objects of the issue and use of proceeds"
    description: >
      Itemised deployment of issue proceeds with schedule of implementation
      and means of finance. Constraints verified from Chapter IX: OFS by
      selling shareholders capped at 20% of total issue size and 50% of a
      seller's pre-issue holding (Reg. 230(1)(f)-(g)); firm arrangements for
      75% of stated means of finance excluding issue proceeds (Reg. 230(1)(e)).
    applicability: always
    required_facts:
      - issue_size_paise
      - objects_of_issue[]
      - gcp_amount_paise
      - means_of_finance
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp, abridged]

  - id: objects.basis_for_issue_price
    clause_ref: "ICDR Sch. VI Part A, para (9)(K) — basis for issue price (adjusted EPS, P/E, RoNW, NAV)"
    section: "Objects of the Issue"
    title: "Basis for issue price"
    description: >
      Quantitative factors: adjusted EPS, P/E relative to industry peers,
      return on net worth, and net asset value per share, computed from the
      restated financial statements.
    applicability: always
    required_facts:
      - restated_financials_upload
      - peer_comparison[]
      - price_band
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp]

  # ── Our Business ─────────────────────────────────────────────────────────
  - id: business.overview
    clause_ref: "ICDR Sch. VI Part A, para (10)(B)(1) — details of the business of the issuer"
    section: "Our Business"
    title: "Business overview"
    description: >
      Primary business, products/services, industries served, customers,
      capacity/utilisation, marketing, competitive strengths, intellectual
      property (para (10)(B)(4)) and material properties (para (10)(B)(5)).
    applicability: always
    required_facts:
      - business_description
      - products_services[]
      - customer_concentration
      - material_properties[]
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp, abridged]

  - id: business.history_corporate_structure
    clause_ref: "ICDR Sch. VI Part A, para (10)(D) — history and corporate structure"
    section: "Our Business"
    title: "History and corporate structure"
    description: >
      Incorporation history, changes of name/registered office, major events,
      subsidiaries and holding structure, and material agreements.
    applicability: always
    required_facts:
      - incorporation_details
      - major_events[]
      - subsidiaries[]
    responsible_role: promoter
    severity: material
    output_targets: [drhp]

  - id: business.key_regulations
    clause_ref: "ICDR Sch. VI Part A, para (10)(C) — Key Industry-Regulations (if applicable)"
    section: "Our Business"
    title: "Key industry regulations and policies"
    description: >
      The key statutes, rules and policies materially applicable to the
      issuer's business (e.g. sector-specific control orders, environmental
      consents, labour and tax law), described in plain language. Distinct
      from the Government Approvals chapter: this describes the regulatory
      framework; that lists the licences actually held.
    applicability: always
    required_facts:
      - applicable_regulations[]
    responsible_role: promoter
    severity: material
    output_targets: [drhp]

  # ── Our Management ───────────────────────────────────────────────────────
  - id: management.board_and_kmp
    clause_ref: "ICDR Sch. VI Part A, para (10)(F) — management (board, KMP, senior management)"
    section: "Our Management"
    title: "Board of directors, KMP and senior management"
    description: >
      Directors' particulars (DIN, address, occupation, other directorships),
      management organisation structure, KMP and senior management details,
      compensation, and interests of directors/KMP.
    applicability: always
    required_facts:
      - board_of_directors[]
      - kmp[]
      - director_interests
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp, abridged]

  - id: management.promoters
    clause_ref: "ICDR Sch. VI Part A, para (10)(G) — promoters and promoter group"
    section: "Our Management"
    title: "Promoters and promoter group"
    description: >
      Promoter identification and particulars, promoter group entities,
      interests of promoters, and payments/benefits to promoters in the last
      two years.
    applicability: always
    required_facts:
      - promoters[]
      - promoter_group_entities[]
      - promoter_interests
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp, abridged]

  # ── Financial Information ────────────────────────────────────────────────
  - id: financials.restated_statements
    clause_ref: "ICDR Sch. VI Part A, para (11)(A) — Restated Financial Information"
    section: "Financial Information"
    title: "Restated financial statements"
    description: >
      Restated financials per ICDR, audited by a peer-reviewed auditor
      (peer-review certification requirement per Reg. 229 proviso).
      AUDITOR-ONLY content: the tool ingests and formats these — it never
      generates them. Marked out-of-scope in the coverage score.
    applicability: always
    required_facts:
      - restated_financials_upload
    responsible_role: auditor
    severity: blocker
    output_targets: [drhp, abridged]

  - id: financials.related_party_transactions
    clause_ref: "ICDR Sch. VI Part A, para (11)(A)(g); summary in para (6)(D) per ICDR (Amendment) Regulations, 2026"
    section: "Financial Information"
    title: "Related party transactions"
    description: >
      RPT disclosures forming part of the restated financial statements, plus
      the Summary of Related Party Transactions in the Introduction (2026
      amendment). High-scrutiny area.
    applicability: always
    required_facts:
      - rpt_summary
      - restated_financials_upload
    responsible_role: promoter
    severity: material
    output_targets: [drhp]

  - id: financials.mdna
    clause_ref: "ICDR Sch. VI Part A, para (11)(C) — Management's Discussion and Analysis"
    section: "Financial Information"
    title: "Management's discussion and analysis"
    description: >
      MD&A of financial condition and results of operations: significant
      developments, factors affecting results, and period-on-period
      comparisons grounded in the restated financials.
    applicability: always
    required_facts:
      - restated_financials_upload
      - business_description
    responsible_role: promoter
    severity: material
    output_targets: [drhp]

  # ── Legal and Other Information ──────────────────────────────────────────
  - id: legal.outstanding_litigation
    clause_ref: "ICDR Sch. VI Part A, para (12)(A)(1)–(2) — Outstanding Litigations and Material Developments"
    section: "Legal and Other Information"
    title: "Outstanding litigation and material developments"
    description: >
      Material outstanding legal proceedings involving the issuer, promoters,
      directors and subsidiaries, per the materiality policy adopted by the
      board; plus outstanding dues to creditors (para (12)(2)).
    applicability: always
    required_facts:
      - material_litigation[]
      - materiality_policy
      - creditor_dues_summary
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp, abridged]

  - id: legal.government_approvals
    clause_ref: "ICDR Sch. VI Part A, para (12)(B) — Government approvals"
    section: "Legal and Other Information"
    title: "Government and other approvals"
    description: >
      Material approvals, licences and registrations required to carry on the
      business, and pending applications.
    applicability: always
    required_facts:
      - licences_approvals[]
    responsible_role: promoter
    severity: material
    output_targets: [drhp]

  # ── Group Companies ──────────────────────────────────────────────────────
  - id: group.group_companies
    clause_ref: "ICDR Sch. VI Part A, para (13)"
    section: "Group Companies"
    title: "Information with respect to group companies"
    description: >
      Names, registered offices, nature of business, and prescribed financial
      information of group companies, including litigation involving them
      that materially affects the issuer.
    applicability: has_group_companies
    required_facts:
      - group_companies[]
    responsible_role: promoter
    severity: material
    output_targets: [drhp]

  # ── Other Regulatory and Statutory Disclosures ───────────────────────────
  - id: regulatory.statutory_disclosures
    clause_ref: "ICDR Sch. VI Part A, para (14)(A)–(D); eligibility per ICDR Reg. 228–230 (Ch. IX)"
    section: "Other Regulatory and Statutory Disclosures"
    title: "Authority for the issue, eligibility, and statutory declarations"
    description: >
      Authority for the issue (board/shareholder resolutions), prohibition
      status under Reg. 228 (debarment, wilful defaulter/fraudulent borrower,
      fugitive economic offender, outstanding convertibles), eligibility
      confirmation under Reg. 229–230, and prescribed disclaimers.
    applicability: always
    required_facts:
      - issue_authorisations
      - reg228_declarations
      - eligibility_confirmation
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp]

  # ── Offering Information ─────────────────────────────────────────────────
  - id: offering.terms_of_issue
    clause_ref: "ICDR Sch. VI Part A, para (15)(A)–(B) — Terms of the Issue, Issue Procedure"
    section: "Offering Information"
    title: "Terms of the issue and issue procedure"
    description: >
      Terms of the issue, issue structure, ASBA/UPI procedure, allotment
      basis (Reg. 268), and refund/payment instructions. Largely standard
      text parameterised by issue particulars — generated by the system from
      confirmed issue facts.
    applicability: always
    required_facts:
      - issue_size_paise
      - price_band
      - minimum_application_size
    responsible_role: system
    severity: material
    output_targets: [drhp]

  - id: offering.foreign_ownership_restrictions
    clause_ref: "ICDR Sch. VI Part A, para (15)(B)(28) — restrictions on foreign ownership of Indian securities, if any (investment by NRIs, FPIs and other non-residents)"
    section: "Offering Information"
    title: "Restrictions on foreign ownership of Indian securities"
    description: >
      Restrictions applicable to investment in the issue by non-resident
      Indians, foreign portfolio investors and other non-residents, under
      FEMA and the applicable FDI policy. Largely standard regulatory text
      parameterised by the issuer's sector; system-generated.
    applicability: always
    required_facts:
      - issuer_identity
    responsible_role: system
    severity: minor
    output_targets: [drhp]

  - id: offering.articles_provisions
    clause_ref: "ICDR Sch. VI Part A, para (15)(C) — main provisions of the Articles of Association (voting, dividend, lien, forfeiture, transfer/transmission, consolidation/splitting)"
    section: "Offering Information"
    title: "Description of equity shares and main provisions of the Articles of Association"
    description: >
      Main provisions of the Articles of Association: members' rights as to
      voting and dividend, lien on shares, process for modification of
      rights, forfeiture of shares, and restrictions on transfer,
      transmission, consolidation or splitting of securities. Extracted from
      the issuer's Articles — the promoter supplies or uploads the AoA.
    applicability: always
    required_facts:
      - aoa_main_provisions
    responsible_role: promoter
    severity: material
    output_targets: [drhp]

  # ── Certification (not a Sch. VI narrative section — filing requirements) ─
  - id: certification.due_diligence_certificate
    clause_ref: "ICDR Reg. 246(3) + Form A / Form G of Schedule V; site visit report annexed"
    section: "Certification"
    title: "Lead manager due-diligence certificate"
    description: >
      Due-diligence certificate (Form A, Sch. V) with additional confirmations
      (Form G) and the lead manager's site visit report, submitted with the
      draft offer document to the SME exchange. BANKER-ONLY content: the tool
      tracks it as a gap; it never generates it.
    applicability: always
    required_facts:
      - due_diligence_certificate_upload
    responsible_role: banker
    severity: blocker
    output_targets: [drhp]

  - id: certification.draft_abridged_prospectus
    clause_ref: "ICDR Reg. 246(3) as amended by ICDR (Amendment) Regulations, 2026; format per Sch. VI Part E"
    section: "Certification"
    title: "Draft abridged prospectus"
    description: >
      The 2026 amendment requires a draft abridged prospectus per Schedule VI
      Part E to accompany the draft offer document filed with the SME
      exchange. Assembled by the system from the same fact store; the former
      'Offer Document Summary' (old Part A para (4)) was omitted by the same
      amendment.
    applicability: always
    required_facts:
      - issue_size_paise
      - business_description
      - selected_financial_summary
    responsible_role: system
    severity: blocker
    output_targets: [abridged]

  - id: offering.dividend_policy
    clause_ref: "ICDR Sch. VI Part A, para (10)(H)"
    section: "Financial Information"
    title: "Dividend policy"
    description: >
      Dividend policy and mode of payment of dividend, and details of
      dividend paid in the last three financial years, the stub period (as
      applicable), and the period between the last audited period and the
      date of filing the draft offer document.
    applicability: always
    required_facts:
      - dividend_policy
      - dividends_paid[]
    responsible_role: promoter
    severity: material
    output_targets: [drhp]

  - id: regulatory.investor_grievances
    clause_ref: "ICDR Sch. VI Part A, para (14)(T)"
    section: "Other Regulatory and Statutory Disclosures"
    title: "Mechanism for redressal of investor grievances"
    description: >
      Arrangements or mechanism evolved by the issuer for redressal of
      investor grievances (including through SCORES); number of investor
      complaints received and disposed of during the preceding three years,
      complaints pending on the date of filing, and time normally taken for
      disposal of various types of grievances.
    applicability: always
    required_facts:
      - investor_grievance_mechanism
      - investor_complaints_summary
    responsible_role: promoter
    severity: material
    output_targets: [drhp]

  - id: other.material_contracts
    clause_ref: "ICDR Sch. VI Part A, para (18)(1)-(3)"
    section: "Other Information"
    title: "Material contracts and documents for inspection"
    description: >
      List of material contracts and material documents, and the time and
      place (including online means) at which they will be available for
      inspection from the date of the offer document until the closing of
      the subscription list.
    applicability: always
    required_facts:
      - material_contracts[]
      - material_documents[]
      - inspection_arrangements
    responsible_role: promoter
    severity: material
    output_targets: [drhp]

  - id: other.declaration
    clause_ref: "ICDR Sch. VI Part A, para (18)(5) — board approval and signature by all directors, MD/Manager and CFO/head of finance, certifying disclosures true and correct; followed by the prescribed 'DECLARATION BY THE ISSUER' compliance statement"
    section: "Other Information"
    title: "Declaration"
    description: >
      The declaration page: the offer document must be approved by the board
      and signed by all directors (including the Managing Director or
      Manager) and the Chief Financial Officer or head of the finance
      function, each certifying that all disclosures are true and correct,
      together with the prescribed declaration that all relevant provisions
      of the Companies Act, 2013 and SEBI regulations have been complied
      with. The prescribed text is standard; the signatory block is rendered
      from the confirmed board and KMP facts. Physical signatures happen
      outside the tool.
    applicability: always
    required_facts:
      - board_of_directors[]
      - kmp[]
    responsible_role: promoter
    severity: blocker
    output_targets: [drhp]
